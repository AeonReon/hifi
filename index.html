function escapeHtml(s) { return String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
// Embed any value as a JS expression inside a double-quoted HTML attribute.
function jsArg(v) { return JSON.stringify(v).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

// ============================================================
// PLAYBACK
// ============================================================
let currentObjectURL = null;

async function playList(trackIds, startIdx = 0) {
    if (!Array.isArray(trackIds)) trackIds = [trackIds];
    state.queue = trackIds.slice();
    state.queueIdx = startIdx;
    await playCurrent();
}

async function playAlbum(key) {
    const album = getAlbum(key);
    if (!album) return;
    await playList(album.tracks.map(t => t.id), 0);
}

async function shufflePlay(trackIds) {
    const arr = trackIds.slice();
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    await playList(arr, 0);
}

async function playCurrent() {
    if (state.queueIdx < 0 || state.queueIdx >= state.queue.length) return;
    const id = state.queue[state.queueIdx];
    const track = state.tracks.find(t => t.id === id);
    if (!track) return;
    state.currentTrack = track;
    if (currentObjectURL) URL.revokeObjectURL(currentObjectURL);
    currentObjectURL = URL.createObjectURL(playableBlob(track));
    audio.src = currentObjectURL;
    audio.playbackRate = state.settings.speed;
    audio.volume = state.settings.volume;

    // Resume audiobook position
    const k = albumKey(track);
    if (state.audiobookIds.has(k) || track.kind === 'audiobook') {
        const saved = await dbGet('meta', 'ab-pos-' + k);
        if (saved?.value && saved.value.trackId === track.id && saved.value.position > 5) {
            audio.currentTime = saved.value.position;
        }
    }

    // Update UI first so the user sees what's loading even if play() is delayed/blocked
    updateTrackInfo();
    if ('mediaSession' in navigator) updateMediaSession(track);
    document.querySelectorAll('.track-row').forEach(r => r.classList.toggle('playing', r.dataset.id === track.id));
    try {
        await audio.play(); // 'play' event listener will sync isPlaying + icons
    } catch (e) {
        console.error('Playback failed', e);
        toast('Tap play to start');
    }
}

function togglePlay() {
    if (!state.currentTrack) {
        if (state.tracks.length) playList(state.tracks.map(t => t.id), 0);
        return;
    }
    // Don't set isPlaying optimistically — the audio element's 'play'/'pause' events
    // are the source of truth. Setting state up-front used to leave the icon stuck
    // showing pause when play() rejected (e.g. an unsupported codec).
    if (audio.paused) audio.play().catch(e => console.warn('play() rejected', e));
    else audio.pause();
}

// When the current track has embedded chapters, the prev/next buttons jump
// between chapters instead of between tracks.
function currentChapters() {
    const t = state.currentTrack;
    return (t && Array.isArray(t.chapters) && t.chapters.length > 1) ? t.chapters : null;
}
function currentChapterIdx() {
    const chs = currentChapters();
    if (!chs) return -1;
    const now = audio.currentTime || 0;
    for (let i = chs.length - 1; i >= 0; i--) if (now >= chs[i].time - 0.25) return i;
    return 0;
}

async function nextTrack() {
    const chs = currentChapters();
    if (chs) {
        const i = currentChapterIdx();
        if (i < chs.length - 1) { audio.currentTime = chs[i + 1].time; return; }
    }
    if (!state.queue.length) return;
    if (state.settings.shuffle) {
        state.queueIdx = Math.floor(Math.random() * state.queue.length);
    } else if (state.queueIdx < state.queue.length - 1) {
        state.queueIdx++;
    } else if (state.settings.repeat === 'all') {
        state.queueIdx = 0;
    } else {
        state.isPlaying = false;
        updatePlayUI();
        return;
    }
    await playCurrent();
}

async function prevTrack() {
    const chs = currentChapters();
    if (chs) {
        const i = currentChapterIdx();
        // If we're more than 3s into the current chapter, restart it; else go to previous chapter
        const chapterStart = chs[i]?.time || 0;
        if ((audio.currentTime || 0) - chapterStart > 3 || i === 0) {
            audio.currentTime = chapterStart;
            return;
        }
        audio.currentTime = chs[i - 1].time;
        return;
    }
    if (!state.queue.length) return;
    if (audio.currentTime > 3) { audio.currentTime = 0; return; }
    if (state.queueIdx > 0) state.queueIdx--;
    else if (state.settings.repeat === 'all') state.queueIdx = state.queue.length - 1;
    else { audio.currentTime = 0; return; }
    await playCurrent();
}

// Jump directly to a chapter of a specific track (used from the chapter list UI)
async function playChapter(trackId, chapterIdx) {
    // Ensure this track is loaded as the queue
    if (!state.currentTrack || state.currentTrack.id !== trackId) {
        state.queue = [trackId];
        state.queueIdx = 0;
        await playCurrent();
    }
    const track = state.tracks.find(t => t.id === trackId);
    const ch = track?.chapters?.[chapterIdx];
    if (!ch) return;
    // Wait for metadata if seeking right after load
    if (audio.readyState < 1) {
        await new Promise(res => audio.addEventListener('loadedmetadata', res, { once: true }));
    }
    audio.currentTime = ch.time;
    if (audio.paused) audio.play().catch(() => {});
}

function updatePlayUI() {
    // Toggle a CSS class on the buttons; the .icon-play/.icon-pause inside
    // each button switch via CSS. This is more reliable than the [hidden]
    // attribute (some browsers don't apply UA display:none to inline SVG
    // children of flex containers).
    const playing = !!state.currentTrack && !audio.paused && !audio.ended;
    $('play-btn').classList.toggle('is-playing', playing);
    $('np-play').classList.toggle('is-playing', playing);
    $('play-btn').classList.toggle('loading', !!state.currentTrack && audio.readyState < 3 && !audio.paused);
    // Belt-and-braces for older Safari: also explicitly toggle inline display.
    $('play-icon').style.display = playing ? 'none' : '';
    $('pause-icon').style.display = playing ? '' : 'none';
    $('np-play-icon').style.display = playing ? 'none' : '';
    $('np-pause-icon').style.display = playing ? '' : 'none';
}

function updateTrackInfo() {
    const t = state.currentTrack;
    if (!t) return;
    $('player-title').textContent = t.title;
    $('player-artist').textContent = t.artist;
    $('np-title').textContent = t.title;
    $('np-artist').textContent = `${t.artist} — ${t.album}`;
    const html = artHTML(t);
    $('player-art').innerHTML = html;
    $('np-art').innerHTML = html;
    updateNpChapters(t);
}

function updateNpChapters(t) {
    const wrap = $('np-chapters');
    if (!wrap) return;
    const chs = (Array.isArray(t.chapters) && t.chapters.length > 1) ? t.chapters : null;
    if (!chs) { wrap.hidden = true; wrap.innerHTML = ''; return; }
    wrap.hidden = false;
    wrap.innerHTML = `
        <div class="np-chapters-title">Chapters · ${chs.length}</div>
        <div class="np-chapters-list">
            ${chs.map((ch, i) => `<button class="np-chapter" data-chapter-idx="${i}" onclick="playChapter(${jsArg(t.id)}, ${i})">
                <span class="np-chapter-num">${i + 1}</span>
                <span class="np-chapter-title">${escapeHtml(ch.title || ('Chapter ' + (i + 1)))}</span>
                <span class="np-chapter-time">${fmtTime(ch.time)}</span>
            </button>`).join('')}
        </div>`;
}

function updateMediaSession(track) {
    navigator.mediaSession.metadata = new MediaMetadata({
        title: track.title,
        artist: track.artist,
        album: track.album,
        artwork: track.artwork ? [{ src: artworkURL(track), type: track.artwork.type || 'image/jpeg' }] : []
    });
    const safe = (action, fn) => { try { navigator.mediaSession.setActionHandler(action, fn); } catch (_) {} };
    safe('play', () => togglePlay());
    safe('pause', () => togglePlay());
    safe('previoustrack', () => prevTrack());
    safe('nexttrack', () => nextTrack());
    safe('seekbackward', (d) => seekBy(-(d?.seekOffset || 15)));
    safe('seekforward', (d) => seekBy(+(d?.seekOffset || 15)));
    safe('seekto', (d) => { if (typeof d?.seekTime === 'number') audio.currentTime = d.seekTime; });
}

// ----- Seek helpers -----
function seekBy(delta) {
    if (!audio.duration || !isFinite(audio.duration)) return;
    const next = Math.max(0, Math.min(audio.duration, (audio.currentTime || 0) + delta));
    audio.currentTime = next;
    flashSeek(delta);
}
function flashSeek(delta) {
    const t = $('toast');
    t.textContent = (delta > 0 ? '+' : '−') + Math.abs(delta) + 's';
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 700);
}

// Keep play/pause icons in sync with the audio element, no matter who triggers it
audio.addEventListener('play', () => { state.isPlaying = true; updatePlayUI(); if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing'; });
audio.addEventListener('pause', () => { state.isPlaying = false; updatePlayUI(); if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused'; });
audio.addEventListener('waiting', () => updatePlayUI());
audio.addEventListener('canplay', () => updatePlayUI());
audio.addEventListener('loadedmetadata', () => {
    const dur = audio.duration || 0;
    $('time-total').textContent = fmtTime(dur);
    $('np-time-total').textContent = fmtTime(dur);
});
audio.addEventListener('error', () => {
    const err = audio.error;
    if (!err) return;
    const t = state.currentTrack;
    const ext = t && t.file ? (((t.file.name || '').match(/\.([a-z0-9]+)$/i) || [])[1] || '').toLowerCase() : '';
    const fmtLabel = ext ? ext.toUpperCase() : 'this file';
    const reasons = {
        1: 'Playback aborted',
        2: 'Network error reading the file',
        3: `Cannot decode ${fmtLabel}. The file may be corrupted or use a codec your browser does not understand.`,
        4: `Your browser cannot play ${fmtLabel} files. Try Chrome on desktop, or convert to MP3/M4A first.`,
    };
    toast(reasons[err.code] || 'Playback error');
    console.error('audio error', err.code, err.message);
});

audio.addEventListener('timeupdate', () => {
    const cur = audio.currentTime || 0;
    const dur = audio.duration || 0;
    const pct = dur ? (cur / dur * 100) : 0;
    $('scrub-fill').style.width = pct + '%';
    $('np-scrub-fill').style.width = pct + '%';
    $('time-current').textContent = fmtTime(cur);
    $('time-total').textContent = fmtTime(dur);
    $('np-time-current').textContent = fmtTime(cur);
    $('np-time-total').textContent = fmtTime(dur);

    // A-B loop enforcement
    if (ab.a != null && ab.b != null && cur >= ab.b - 0.05) {
        audio.currentTime = ab.a;
    }

    // Highlight current chapter in chapter list, if visible
    if (currentChapters() && state._lastChapterIdx !== currentChapterIdx()) {
        state._lastChapterIdx = currentChapterIdx();
        document.querySelectorAll('[data-chapter-idx]').forEach(el => {
            el.classList.toggle('playing', parseInt(el.dataset.chapterIdx) === state._lastChapterIdx);
        });
    }

    // Save audiobook position every ~3s
    const t = state.currentTrack;
    if (t) {
        const k = albumKey(t);
        if (state.audiobookIds.has(k) || t.kind === 'audiobook') {
            if (!playCurrent._lastSave || Date.now() - playCurrent._lastSave > 3000) {
                playCurrent._lastSave = Date.now();
                dbPut('meta', { key: 'ab-pos-' + k, value: { trackId: t.id, position: cur, ts: Date.now() } });
            }
        }
    }
});

audio.addEventListener('ended', () => {
    if (state.settings.repeat === 'one') { audio.currentTime = 0; audio.play(); return; }
    nextTrack();
});

// ============================================================
// SCRUB / VOLUME
// ============================================================
function bindScrub(scrubEl) {
    let dragging = false;
    const onMove = (e) => {
        const rect = scrubEl.getBoundingClientRect();
        const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
        const pct = Math.max(0, Math.min(1, x / rect.width));
        if (audio.duration) audio.currentTime = pct * audio.duration;
    };
    scrubEl.addEventListener('mousedown', (e) => { dragging = true; onMove(e); });
    scrubEl.addEventListener('touchstart', (e) => { dragging = true; onMove(e); e.preventDefault(); }, { passive: false });
    document.addEventListener('mousemove', (e) => { if (dragging) onMove(e); });
    document.addEventListener('touchmove', (e) => { if (dragging) { onMove(e); e.preventDefault(); } }, { passive: false });
    document.addEventListener('mouseup', () => { dragging = false; });
    document.addEventListener('touchend', () => { dragging = false; });
}

function bindVol() {
    const bar = $('vol-bar');
    let dragging = false;
    const onMove = (e) => {
        const rect = bar.getBoundingClientRect();
        const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
        const pct = Math.max(0, Math.min(1, x / rect.width));
        state.settings.volume = pct;
        audio.volume = pct;
        updateVolUI();
        saveSettings();
    };
    bar.addEventListener('mousedown', (e) => { dragging = true; onMove(e); });
    bar.addEventListener('touchstart', (e) => { dragging = true; onMove(e); }, { passive: true });
    document.addEventListener('mousemove', (e) => { if (dragging) onMove(e); });
    document.addEventListener('touchmove', (e) => { if (dragging) onMove(e); }, { passive: true });
    document.addEventListener('mouseup', () => { dragging = false; });
    document.addEventListener('touchend', () => { dragging = false; });
}

function updateVolUI() { $('vol-fill').style.width = (state.settings.volume * 100) + '%'; }

// ============================================================
// EQUALIZER (Web Audio API, 3-band BiquadFilter chain)
// Lazy-init: don't create AudioContext until the user actually opens EQ.
// ============================================================
const eq = {
    ctx: null,
    src: null,
    bass: null,
    mid: null,
    treble: null,
    gain: null,
    on: false,
    bands: { bass: 0, mid: 0, treble: 0, preamp: 0 },
};
const EQ_PRESETS = {
    'Flat': { bass: 0, mid: 0, treble: 0, preamp: 0 },
    'Bass boost': { bass: 8, mid: 0, treble: 2, preamp: -2 },
    'Treble boost': { bass: 0, mid: 0, treble: 8, preamp: -2 },
    'Voice / Audiobook': { bass: -3, mid: 5, treble: 4, preamp: 0 },
    'Loud (compressed)': { bass: 5, mid: 1, treble: 6, preamp: -3 },
    'Warm': { bass: 4, mid: -1, treble: -2, preamp: 0 },
    'Bright': { bass: -2, mid: 1, treble: 5, preamp: -1 },
};
function ensureEqGraph() {
    if (eq.ctx) return;
    try {
        eq.ctx = new (window.AudioContext || window.webkitAudioContext)();
        eq.src = eq.ctx.createMediaElementSource(audio);
        eq.bass = eq.ctx.createBiquadFilter(); eq.bass.type = 'lowshelf'; eq.bass.frequency.value = 200;
        eq.mid = eq.ctx.createBiquadFilter(); eq.mid.type = 'peaking'; eq.mid.frequency.value = 1000; eq.mid.Q.value = 1;
        eq.treble = eq.ctx.createBiquadFilter(); eq.treble.type = 'highshelf'; eq.treble.frequency.value = 4000;
        eq.gain = eq.ctx.createGain(); eq.gain.gain.value = 1;
        eq.src.connect(eq.bass).connect(eq.mid).connect(eq.treble).connect(eq.gain).connect(eq.ctx.destination);
        applyEqValues();
    } catch (e) { console.warn('EQ init failed', e); eq.ctx = null; }
}
function applyEqValues() {
    if (!eq.ctx) return;
    const b = eq.on ? eq.bands : { bass: 0, mid: 0, treble: 0, preamp: 0 };
    eq.bass.gain.value = b.bass;
    eq.mid.gain.value = b.mid;
    eq.treble.gain.value = b.treble;
    // preamp dB → linear
    eq.gain.gain.value = Math.pow(10, (b.preamp || 0) / 20);
}
function setEqOn(v) { eq.on = !!v; if (v) ensureEqGraph(); applyEqValues(); saveSettings(); updateEqUI(); }
function setEqBand(name, val) { eq.bands[name] = val; applyEqValues(); saveSettings(); }
function applyEqPreset(name) {
    const p = EQ_PRESETS[name]; if (!p) return;
    Object.assign(eq.bands, p);
    if (!eq.on) eq.on = true;
    ensureEqGraph(); applyEqValues(); saveSettings(); updateEqUI();
}
function showEqModal() {
    const presetBtns = Object.keys(EQ_PRESETS).map(n => `<button class="ctx-item" data-preset="${n}">${n}</button>`).join('');
    showModal(`

        <div class="eq-row"><span>Mid</span><input type="range" id="eq-mid" min="-15" max="15" step="0.5" value="${eq.bands.mid}"><span class="eq-val" id="eq-mid-v">${eq.bands.mid}dB</span></div>
        <div class="eq-row"><span>Treble</span><input type="range" id="eq-treble" min="-15" max="15" step="0.5" value="${eq.bands.treble}"><span class="eq-val" id="eq-treble-v">${eq.bands.treble}dB</span></div>
        <div class="eq-row"><span>Preamp</span><input type="range" id="eq-pre" min="-12" max="6" step="0.5" value="${eq.bands.preamp}"><span class="eq-val" id="eq-pre-v">${eq.bands.preamp}dB</span></div>
        <div class="eq-presets">${presetBtns}</div>
        <div class="modal-actions"><button class="btn-text" onclick="hideModal()">Done</button></div>
    `);
    $('eq-on').addEventListener('change', e => setEqOn(e.target.checked));
    const bind = (id, name, lblId) => {
        $(id).addEventListener('input', e => {

}

async function deleteTrack(trackId) {
    await dbDelete('tracks', trackId);
    state.tracks = state.tracks.filter(t => t.id !== trackId);
    for (const pl of state.playlists) {
        if (pl.trackIds.includes(trackId)) {
            pl.trackIds = pl.trackIds.filter(i => i !== trackId);
            await dbPut('playlists', pl);
        }
    }
    if (state.currentTrack && state.currentTrack.id === trackId) {
        // Remove from queue and try to advance
        const removedIdx = state.queue.indexOf(trackId);
        state.queue = state.queue.filter(id => id !== trackId);
        if (state.queue.length) {
            state.queueIdx = Math.min(removedIdx, state.queue.length - 1);
            await playCurrent();
        } else {
            audio.pause();
            audio.removeAttribute('src');
            state.currentTrack = null;
            state.queueIdx = -1;
            $('player-title').textContent = 'Nothing playing';
            $('player-artist').textContent = '';
            $('player-art').innerHTML = '';
        }
    }
    render();
    toast('Removed');
}

function showSleepMenu(e) {

    const opts = state.sleepTimer

        : [
            { label: '5 minutes', mins: 5 },
            { label: '15 minutes', mins: 15 },

        ];
    menu.innerHTML = opts.map((o, i) => `<div class="ctx-item" data-i="${i}">${o.label}</div>`).join('');
    menu.classList.add('active');
    const r = e.target.closest('button').getBoundingClientRect();
    let x = r.left;
    let y = r.top - 8;
    requestAnimationFrame(() => {
        const mr = menu.getBoundingClientRect();
        if (x + mr.width > window.innerWidth - 8) x = window.innerWidth - mr.width - 8;
        y = r.top - mr.height - 8;
        if (y < 8) y = r.bottom + 8;
        menu.style.left = x + 'px';
        menu.style.top = y + 'px';
    });
    menu.style.left = x + 'px';
    menu.style.top = y + 'px';
    menu.querySelectorAll('.ctx-item').forEach(el => {
        el.addEventListener('click', () => {
            menu.classList.remove('active');
            setSleep(opts[parseInt(el.dataset.i)].mins);
        });

function setSleep(mins) {
    if (state.sleepTimer) {
        if (typeof state.sleepTimer === 'object' && state.sleepTimer.cancel) state.sleepTimer.cancel();
        else clearTimeout(state.sleepTimer);
        state.sleepTimer = null;
    }
    if (mins === 0) { toast('Sleep timer cancelled'); $('sleep-btn').classList.remove('active'); $('np-sleep').classList.remove('active'); return; }
    if (mins === -1) {
        const onEnd = () => { audio.pause(); updatePlayUI(); audio.removeEventListener('ended', onEnd); $('sleep-btn').classList.remove('active'); $('np-sleep').classList.remove('active'); toast('Stopped (end of track)'); };
        audio.addEventListener('ended', onEnd);
        state.sleepTimer = { cancel: () => audio.removeEventListener('ended', onEnd) };
        toast('Will stop at end of track');
    } else if (mins === -2) {
        const chs = currentChapters();
        if (!chs) { toast('No chapters on this track — using End of track'); setSleep(-1); return; }
        const i = currentChapterIdx();
        const endTime = (i < chs.length - 1) ? chs[i + 1].time : (audio.duration || Infinity);
        const checker = setInterval(() => {
            if ((audio.currentTime || 0) >= endTime - 0.05) {
                audio.pause(); updatePlayUI(); clearInterval(checker);
                $('sleep-btn').classList.remove('active'); $('np-sleep').classList.remove('active');
                toast('Stopped (end of chapter)');
            }
        }, 500);
        state.sleepTimer = { cancel: () => clearInterval(checker) };
        toast('Will stop at end of chapter');
    } else {
        state.sleepTimer = setTimeout(() => {
            audio.pause();
            state.isPlaying = false;
            updatePlayUI();
            $('sleep-btn').classList.remove('active');
            $('np-sleep').classList.remove('active');
            toast('Sleep timer ended');
        }, mins * 60 * 1000);
        toast(`Sleep in ${mins} minutes`);
    }
    $('sleep-btn').classList.add('active');
    $('np-sleep').classList.add('active');
}

// Double-tap on Now Playing artwork: left half = -15s, right half = +15s
(function bindNpArtDoubleTap() {
    const art = $('np-art');
    let lastTap = 0;
    art.addEventListener('click', (e) => {
        const now = Date.now();
        if (now - lastTap < 350) {
            const rect = art.getBoundingClientRect();
            const x = (e.clientX || 0) - rect.left;
            seekBy(x < rect.width / 2 ? -15 : +15);
            lastTap = 0;
        } else {
            lastTap = now;
        }
    });
})();

// Swipe-down on Now Playing fullscreen to dismiss
(function bindNpSwipeDown() {
    const np = $('now-playing-full');
    let startY = 0, dy = 0, dragging = false;
    np.addEventListener('touchstart', (e) => {
        if (np.scrollTop > 0) return;
        startY = e.touches[0].clientY;
        dy = 0;
        dragging = true;
    }, { passive: true });
    np.addEventListener('touchmove', (e) => {
        if (!dragging) return;
        dy = e.touches[0].clientY - startY;
        if (dy > 0) np.style.transform = `translateY(${dy}px)`;
    }, { passive: true });
    np.addEventListener('touchend', () => {
        if (!dragging) return;
        dragging = false;
        if (dy > 110) np.classList.remove('active');
        np.style.transform = '';
    });
})();

document.addEventListener('keydown', (e) => {
    if (e.target.matches('input, textarea')) return;
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    else if (e.key === 'ArrowRight' && e.shiftKey) nextTrack();
    else if (e.key === 'ArrowLeft' && e.shiftKey) prevTrack();
    else if (e.key === 'ArrowRight') { e.preventDefault(); seekBy(+10); }
    else if (e.key === 'ArrowLeft') { e.preventDefault(); seekBy(-10); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); state.settings.volume = Math.min(1, state.settings.volume + 0.05); audio.volume = state.settings.volume; updateVolUI(); saveSettings(); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); state.settings.volume = Math.max(0, state.settings.volume - 0.05); audio.volume = state.settings.volume; updateVolUI(); saveSettings(); }
    else if (e.key === 'm' || e.key === 'M') { audio.muted = !audio.muted; toast(audio.muted ? 'Muted' : 'Unmuted'); }
    else if (e.key === 'b' || e.key === 'B') { addBookmark(); }
    else if (e.key === 'l' || e.key === 'L') { abPress(); }
    else if (e.key === 'Escape') { hideModal(); $('now-playing-full').classList.remove('active'); }
});

(async () => {
    try {
        await loadAll();
        render();
        // Persist storage so iOS doesn't evict our IndexedDB
        if (navigator.storage && navigator.storage.persist) {
            navigator.storage.persist().catch(() => {});
        }
        // Register SW
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    } catch (e) {
        console.error(e);
        $('content').innerHTML = `<div class="empty"><div class="empty-title">Could not load library</div><div class="empty-text">${escapeHtml(e.message || String(e))}</div></div>`;
    }
})();
