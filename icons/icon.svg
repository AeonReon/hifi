<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a20"/>
      <stop offset="100%" stop-color="#0a0a0d"/>
    </linearGradient>
    <linearGradient id="gold" x1="0.2" y1="0.1" x2="0.9" y2="0.95">
      <stop offset="0%" stop-color="#f0d488"/>
      <stop offset="55%" stop-color="#c9a961"/>
      <stop offset="100%" stop-color="#85683a"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="rgba(201,169,97,0.30)"/>
      <stop offset="100%" stop-color="rgba(201,169,97,0)"/>
    </radialGradient>
  </defs>
  <!-- Full-bleed background (square — iOS will round it) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#centerGlow)"/>
  <!-- Concentric vinyl-style rings -->
  <g fill="none" stroke="url(#gold)" stroke-width="3">
    <circle cx="512" cy="512" r="380" opacity="0.18"/>
    <circle cx="512" cy="512" r="320" opacity="0.28"/>
    <circle cx="512" cy="512" r="260" opacity="0.40"/>
    <circle cx="512" cy="512" r="200" opacity="0.55"/>
    <circle cx="512" cy="512" r="140" opacity="0.75"/>
  </g>
  <!-- Center label -->
  <circle cx="512" cy="512" r="88" fill="url(#gold)"/>
  <circle cx="512" cy="512" r="22" fill="#0a0a0d"/>
</svg>
